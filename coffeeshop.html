<div can-play id="visit-counter">
  <button type="button">check in</button>
  <p><span class="count">0</span> people have checked in</p>
</div>
<script>
  const visitCounter = document.getElementById('visit-counter');

  // 1. the data this element stores, and what it starts as
  visitCounter.defaultData = { count: 0 };

  // 2. how that data turns into what people see
  visitCounter.updateElement = ({ element, data }) => {
    element.querySelector('.count').textContent = data.count;
  };

  // 3. bump the count when someone clicks the button
  visitCounter.onClick = (event, { setData }) => {
    setData((data) => {
      data.count += 1;
    });
  };
</script>

<script> const songs = [
{
    title:"Houdou Nisbi",
    artist:"Ziad Rahbani",
    src:"music/hodou_nisbi.mp3"
},
{
    title:"Sparks",
    artist:"Coldplay",
    src:"music/sparks_coldplay.mp3"
},
{
    title:"Fady Shewaya",
    artist:"Hamza Namira",
    src:"music/fady_shewaya.mp3"
}
];

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const progress = document.getElementById("progress");

let index = 0;
let playing = false;

function loadSong(song){
    title.textContent = song.title;
    artist.textContent = song.artist;
    audio.src = song.src;
}

loadSong(songs[index]);

playBtn.onclick = () => {
    if(playing){
        audio.pause();
        playBtn.textContent = "▶";
    }else{
        audio.play();
        playBtn.textContent = "⏸";
    }
    playing = !playing;
};

nextBtn.onclick = () => {
    index = (index + 1) % songs.length;
    loadSong(songs[index]);
    audio.play();
    playing = true;
    playBtn.textContent = "⏸";
};

prevBtn.onclick = () => {
    index = (index - 1 + songs.length) % songs.length;
    loadSong(songs[index]);
    audio.play();
    playing = true;
    playBtn.textContent = "⏸";
};

audio.addEventListener("timeupdate", () => {
    progress.max = audio.duration || 0;
    progress.value = audio.currentTime;
});

progress.addEventListener("input", () => {
    audio.currentTime = progress.value;
});

audio.addEventListener("ended", () => {
    nextBtn.click();
});</script>

    to {

    animation: zone-spin 0.9s ease-in-out;

<div class="overlay" can-play id="hover-zone">
  <p>hover table</p>
  <p><span class="count">0</span>/3 hovering</p>
</div>
<script>
  const zone = document.getElementById('hover-zone');

  // each visitor only tracks their own hover state (presence, not saved)
  zone.defaultData = {};
  zone.myDefaultAwareness = { hovering: false };

  // no saved data to render, but can-play still needs an updateElement
  zone.updateElement = () => {};

  zone.onMount = ({ getElement, setMyAwareness }) => {
    const el = getElement();
    el.addEventListener('mouseenter', () => setMyAwareness({ hovering: true }));
    el.addEventListener('mouseleave', () =>
      setMyAwareness({ hovering: false }),
    );
  };

  let wasBelow = true; // only fire as we *cross* the threshold, not every tick
  zone.updateElementAwareness = ({ element, awareness }) => {
    const hovering = awareness.filter((a) => a?.hovering).length;
    element.querySelector('.count').textContent = hovering;
    if (hovering >= 3 && wasBelow) {
      playhtml.dispatchPlayEvent({ type: 'zone-celebrate' });
    }
    wasBelow = hovering < 3;
  };

  // an event is a one-off broadcast: everyone present runs this once
  playhtml.registerPlayEventListener('zone-celebrate', {
    onEvent: () => {
      zone.classList.add('celebrate');
      zone.addEventListener(
        'animationend',
        () => zone.classList.remove('celebrate'),
        { once: true },
      );
    },
  });
</script>

<script>
const sketch = (p) => {

    let brushColor;

    p.setup = function () {
        const canvas = p.createCanvas(180, 180);
        canvas.parent("paintBox");

        p.background(255);

        // Pick a random color once when the page loads
        brushColor = p.color(
            p.random(255),
            p.random(255),
            p.random(255)
        );
    };

    p.draw = function () {
        if (p.mouseIsPressed &&
            p.mouseX >= 0 && p.mouseX < p.width &&
            p.mouseY >= 0 && p.mouseY < p.height) {

            p.noStroke();
            p.fill(brushColor);
            p.circle(p.mouseX, p.mouseY, 12);
        }
    };

};

new p5(sketch);

</script>
