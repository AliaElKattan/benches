<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- 
      This is an HTML comment
      You can write text in a comment and the content won't be visible in the page
    -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--
      This is the page head - it contains info the browser uses
      Like the title, which appears on the browser tab but not inside the page
      Further down you'll see the content that displays in the page
    -->
    <title>playhtml starter</title>

    <!-- The website stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

        <!-- Option 1 (simplest, no customization) -->
    <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml@latest";

      // Initialize with cursor tracking
      playhtml.init({
        cursors: {
          enabled: true,
          room: "page"
        }
      });

      // Make playhtml available globally for script.js
      window.playhtml = playhtml;


      // select the button element by its ID
const button = document.getElementById('my-button');

// add an event listener to the button that listens for a click event
button.addEventListener('click', () => {
  // when the button is clicked, show an alert message
  alert('Button clicked!');
  // you can also change the button's text or style here if you want
  button.textContent = 'Clicked!';
  // change the button's css style
  button.style.backgroundColor = 'red';
});

const rectangle = document.getElementById('color-rect');
const button_color = document.getElementById('color-btn');
button_color.addEventListener('click', () => {
  // change the style locally; can-mirror syncs it to everyone
  const hue = Math.floor(Math.random() * 360);
  rectangle.style.background = `hsl(${hue}, 80%, 70%)`;
});



    </script>


  <body>



<img src="images/player_1.png" width="270" height="220" style="margin-left: 10%; margin-top: 1%;" can-move can-spin/> 
<img src="images/player_2.png" width="240" height="220" style="margin-left: 15%; margin-top: 1%;" can-move/>

<img src="images/player_4.png" width="270" height="220" style="margin-left: 25%; margin-top: 1%;" can-spin/> 
<img src="images/player_5.webp" width="230" height="220" style="margin-left: 30%; margin-top: 1%;" can-move/> 
<img src="images/player_6.webp" width="230" height="220" style="margin-left: 35%; margin-top: 1%;" can-move/> 

<button id="my-button">Click me!!</button>

<div can-mirror id="color-rect"></div>
<button id="color-btn">random color</button>




<img src="images/football.png" width="50" height="50" can-move>
